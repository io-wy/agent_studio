# Training Job Template for Kubernetes
# This is a template - values will be substituted by the backend

---
apiVersion: batch/v1
kind: Job
metadata:
  name: ${TRAINING_JOB_NAME}
  namespace: ${PROJECT_NAMESPACE}
  labels:
    app.kubernetes.io/name: agent-studio
    app.kubernetes.io/component: training-job
    app.kubernetes.io/instance: ${TRAINING_JOB_ID}
    agent-studio.ai/tenant: ${TENANT_ID}
    agent-studio.ai/project: ${PROJECT_ID}
    agent-studio.ai/training-job: ${TRAINING_JOB_ID}
  annotations:
    agent-studio.ai/created-by: ${CREATED_BY}
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: agent-studio
        app.kubernetes.io/component: training-job
        agent-studio.ai/tenant: ${TENANT_ID}
        agent-studio.ai/project: ${PROJECT_ID}
        agent-studio.ai/training-job: ${TRAINING_JOB_ID}
    spec:
      restartPolicy: OnFailure
      priorityClassName: agent-studio-workload

      # Service account for K8s API access
      serviceAccountName: agent-studio-job

      # Volumes
      volumes:
        - name: training-config
          configMap:
            name: ${TRAINING_JOB_NAME}-config
        - name: output-volume
          emptyDir: {}

      # Init container to download dataset
      initContainers:
        - name: download-dataset
          image: curlimages/curl:latest
          command:
            - /bin/sh
            - -c
            - |
              echo "Downloading dataset from ${DATASET_URL}"
              # Download dataset from object store
              mc alias set minio ${S3_ENDPOINT} ${S3_ACCESS_KEY} ${S3_SECRET_KEY} || true
              mc cp minio/${DATASET_PATH} /data/ || echo "No dataset to download"
          volumeMounts:
            - name: output-volume
              mountPath: /data

      # Main training container
      containers:
        - name: trainer
          image: ${TRAINING_IMAGE}
          env:
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: MLFLOW_TRACKING_URI
              value: "${MLFLOW_TRACKING_URI}"
            - name: S3_ENDPOINT
              value: "${S3_ENDPOINT}"
            - name: AWS_ACCESS_KEY_ID
              value: "${S3_ACCESS_KEY}"
            - name: AWS_SECRET_ACCESS_KEY
              value: "${S3_SECRET_KEY}"
            - name: TRAINING_JOB_ID
              value: "${TRAINING_JOB_ID}"
          resources:
            requests:
              cpu: ${CPU_REQUEST}
              memory: ${MEMORY_REQUEST}
              nvidia.com/gpu: ${GPU_REQUEST}
            limits:
              cpu: ${CPU_LIMIT}
              memory: ${MEMORY_LIMIT}
              nvidia.com/gpu: ${GPU_LIMIT}
          volumeMounts:
            - name: training-config
              mountPath: /config
              readOnly: true
            - name: output-volume
              mountPath: /output

          command:
            - python
            - -m
            - train
            - --config
            - /config/training.yaml

      # Node selector for GPU nodes
      nodeSelector:
        gpu: "true"
        # kubernetes.io/arch: amd64

      tolerations:
        - key: "nvidia.com/gpu"
          operator: "Exists"
          effect: "NoSchedule"

---
# ConfigMap for training configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: ${TRAINING_JOB_NAME}-config
  namespace: ${PROJECT_NAMESPACE}
  labels:
    app.kubernetes.io/name: agent-studio
    app.kubernetes.io/component: training-config
data:
  training.yaml: |
    ${TRAINING_CONFIG_YAML}

---
# Kueue Workload for job queueing
apiVersion: kueue.x-k8s.io/v1beta1
kind: Workload
metadata:
  name: ${TRAINING_JOB_NAME}-workload
  namespace: ${PROJECT_NAMESPACE}
spec:
  queueName: training-queue
  priorityClassName: agent-studio-workload
  priority: 1000000
  pods:
    - count: 1
      template:
        spec:
          containers:
            - resources:
                requests:
                  cpu: ${CPU_REQUEST}
                  memory: ${MEMORY_REQUEST}
                  nvidia.com/gpu: ${GPU_REQUEST}
