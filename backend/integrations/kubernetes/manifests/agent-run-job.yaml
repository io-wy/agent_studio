# Agent Run Job Template for Kubernetes

---
apiVersion: batch/v1
kind: Job
metadata:
  name: ${AGENT_RUN_NAME}
  namespace: ${PROJECT_NAMESPACE}
  labels:
    app.kubernetes.io/name: agent-studio
    app.kubernetes.io/component: agent-run
    app.kubernetes.io/instance: ${AGENT_RUN_ID}
    agent-studio.ai/tenant: ${TENANT_ID}
    agent-studio.ai/project: ${PROJECT_ID}
    agent-studio.ai/agent-spec: ${AGENT_SPEC_ID}
    agent-studio.ai/agent-revision: ${AGENT_REVISION_ID}
  annotations:
    agent-studio.ai/created-by: ${CREATED_BY}
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: agent-studio
        app.kubernetes.io/component: agent-run
        agent-studio.ai/tenant: ${TENANT_ID}
        agent-studio.ai/project: ${PROJECT_ID}
        agent-studio.ai/agent-spec: ${AGENT_SPEC_ID}
        agent-studio.ai/agent-revision: ${AGENT_REVISION_ID}
    spec:
      restartPolicy: OnFailure

      # Service account for K8s API access
      serviceAccountName: agent-studio-job

      volumes:
        - name: agent-bundle
          emptyDir: {}

      containers:
        - name: agent-runner
          image: ${AGENT_RUNTIME_IMAGE}
          env:
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: S3_ENDPOINT
              value: "${S3_ENDPOINT}"
            - name: AWS_ACCESS_KEY_ID
              value: "${S3_ACCESS_KEY}"
            - name: AWS_SECRET_ACCESS_KEY
              value: "${S3_SECRET_KEY}"
            - name: AGENT_RUN_ID
              value: "${AGENT_RUN_ID}"
            - name: MLFLOW_TRACKING_URI
              value: "${MLFLOW_TRACKING_URI}"
          resources:
            requests:
              cpu: ${CPU_REQUEST}
              memory: ${MEMORY_REQUEST}
            limits:
              cpu: ${CPU_LIMIT}
              memory: ${MEMORY_LIMIT}
          volumeMounts:
            - name: agent-bundle
              mountPath: /agent

          command:
            - python
            - -m
            - agent_runner
            - --revision-id
            - ${AGENT_REVISION_ID}
            - --run-id
            - ${AGENT_RUN_ID}
            - --input
            - ${INPUT_DATA_PATH}

      # Node affinity for CPU workloads
      nodeSelector:
        workload-type: agent-run
